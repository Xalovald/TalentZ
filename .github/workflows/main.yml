on:
  push:
    branches:
      - main

name: Test, Build and Release apk
jobs:
  build:
    name: Build apk
    runs-on: self-hosted
    defaults:
      run:
        working-directory: talentz_mobile
    steps:
    - uses: actions/checkout@v2
    - uses: actions/setup-java@v1
      with:
        java-version: '12.x'
    - uses: subosito/flutter-action@v1
      with:
        flutter-version: '3.19.6'
    - run: flutter pub get
    - run: flutter build apk --debug --split-per-abi
  pull:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses : actions/checkout@v2
    
    - name: Pull repository to server
      run: |
        git pull origin main
  copy:
    runs-on: self-hosted

    steps:
    - name: Checkout repository
      uses : actions/checkout@v2
    
    - name: Copy files to distant server
      env:
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY}}
      run: |
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa

        SERVER_USER="root"
        SERVER_IP="31.207.38.42"
        SERVER_PATH="/root/TalentZ"

        ssh-keyscan -H $SERVER_IP >> ~/.ssh/known-hosts

        ssh -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_IP "rm -rf $SERVER_PATH"

        rsync -avz --delete -e "ssh -i ~/.ssh/id_rsa" ./ $SERVER_USER@$SERVER_IP:$SERVER_PATH
    - name: Run Docker Compose on maind distant server
      run: |
        ssh -i ~/.ssh/id_rsa $SERVER_USER@$SERVER_IP << EOF
          cd /root/TalentZ
          docker compose down
          docker compose up --build
        EOF